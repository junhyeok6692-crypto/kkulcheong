<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>정부지원사업 모아보기 — 디자인 미리보기</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendard-variable-dynamic-subset.min.css" />
<style>
  :root{
    --canvas:#f6f5f4; --surface:#fff; --hairline:#e6e6e6;
    --ink:#0a0a0a; --ink-2:#31302e; --ink-muted:#615d59; --ink-faint:#a39e98;
    --primary:#0075de; --primary-active:#005bab; --secondary:#213183;
    --sky:#62aef0; --purple:#d6b6f6; --pink:#ff64c8; --orange:#dd5b00;
    --teal:#2a9d99; --green:#1aae39; --brown:#523410;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--canvas);color:var(--ink);
    font-family:"Pretendard Variable",Pretendard,-apple-system,system-ui,"Segoe UI","Apple SD Gothic Neo","Malgun Gothic",sans-serif;}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:768px;margin:0 auto;padding:0 16px}
  .soft{box-shadow:rgba(0,0,0,.01) 0 .175px 1.041px,rgba(0,0,0,.02) 0 .8px 2.925px,rgba(0,0,0,.027) 0 2.025px 7.847px,rgba(0,0,0,.04) 0 4px 18px}

  /* Hero */
  .hero{position:relative;overflow:hidden;background:var(--secondary);color:#fff}
  .hero .dots span{position:absolute;border-radius:9999px;filter:blur(2px);opacity:.8}
  .hero .inner{position:relative;max-width:768px;margin:0 auto;padding:64px 16px}
  .badge{display:inline-flex;align-items:center;border-radius:9999px;background:rgba(255,255,255,.1);
    padding:4px 12px;font-size:12px;font-weight:600;color:rgba(255,255,255,.9);
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.15)}
  .hero h1{margin:20px 0 0;font-size:44px;line-height:1.05;letter-spacing:-.03em;font-weight:700}
  .hero p{margin:20px 0 0;max-width:460px;font-size:16px;line-height:1.6;color:rgba(255,255,255,.7)}
  .hero p .hl{display:inline-block;margin-top:4px;font-size:18px;font-weight:600;color:#fff}
  .hero p .hl b{color:var(--sky);font-weight:600}
  @media(max-width:600px){.hero h1{font-size:34px}}

  /* Profile panel */
  .panel{margin:24px 0 16px;border:1px solid var(--hairline);border-radius:12px;background:var(--surface)}
  .panel>button{display:flex;width:100%;align-items:center;gap:8px;padding:12px 16px;
    background:none;border:0;font:inherit;font-weight:500;text-align:left;cursor:pointer;color:var(--ink)}
  .panel .tagline{border-radius:9999px;background:rgba(0,117,222,.1);padding:2px 8px;font-size:12px;font-weight:500;color:var(--primary)}
  .panel .caret{margin-left:auto;color:var(--ink-faint)}
  .panel .body{border-top:1px solid var(--hairline);padding:16px;display:none}
  .panel.open .body{display:block}
  .panel .grp{margin-bottom:16px}
  .panel .grp:last-child{margin-bottom:0}
  .lbl{font-size:12px;font-weight:600;color:var(--ink-muted);margin:0 0 8px}
  select{border:1px solid var(--hairline);border-radius:4px;background:var(--surface);padding:6px 10px;font:inherit;font-size:14px;color:var(--ink)}
  .chips{display:flex;flex-wrap:wrap;gap:8px}
  .chip{border:1px solid var(--hairline);background:var(--surface);color:var(--ink-muted);
    border-radius:9999px;padding:4px 12px;font:inherit;font-size:14px;cursor:pointer;transition:.15s}
  .chip:hover{border-color:rgba(0,117,222,.4)}
  .chip.on{border-color:var(--primary);background:var(--primary);color:#fff}

  /* Filter bar */
  .bar{position:sticky;top:0;z-index:10;margin:0 -16px 24px;padding:16px;
    border-bottom:1px solid var(--hairline);background:rgba(246,245,244,.9);backdrop-filter:blur(8px)}
  .bar input[type=text]{width:100%;border:1px solid var(--hairline);border-radius:4px;background:var(--surface);
    padding:10px 16px;font:inherit;font-size:14px;color:var(--ink);margin-bottom:12px}
  .bar input[type=text]:focus{outline:0;border-color:var(--primary)}
  .row{display:flex;flex-wrap:wrap;align-items:center;gap:8px;font-size:14px}
  .tgl{border:1px solid var(--hairline);background:var(--surface);color:var(--ink-muted);
    border-radius:8px;padding:6px 12px;font:inherit;font-weight:500;cursor:pointer;transition:.15s}
  .tgl.on{background:var(--primary);border-color:var(--primary);color:#fff}
  .tgl.dark.on{background:var(--ink);border-color:var(--ink);color:#fff}
  .tgl:disabled{opacity:.4;cursor:not-allowed}
  .count{margin-left:auto;color:var(--ink-faint)}
  .check{display:flex;align-items:center;gap:6px;color:var(--ink-muted);cursor:pointer}
  .check input{accent-color:var(--primary)}

  /* Cards */
  ul{list-style:none;margin:0;padding:0;display:flex;flex-direction:column;gap:12px}
  .card{display:block;border:1px solid var(--hairline);border-radius:12px;background:var(--surface);padding:16px;transition:box-shadow .15s}
  .card:hover{box-shadow:rgba(0,0,0,.01) 0 .175px 1.041px,rgba(0,0,0,.02) 0 .8px 2.925px,rgba(0,0,0,.027) 0 2.025px 7.847px,rgba(0,0,0,.04) 0 4px 18px}
  .meta{display:flex;align-items:center;gap:8px;margin-bottom:6px}
  .cat{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--hairline);border-radius:9999px;padding:2px 8px;font-size:12px;color:var(--ink-2)}
  .dot{width:6px;height:6px;border-radius:9999px}
  .rgn{border-radius:9999px;background:var(--canvas);padding:2px 8px;font-size:12px;color:var(--ink-muted)}
  .dday{margin-left:auto;font-size:12px;font-weight:500}
  .dday.normal{color:var(--ink-muted)} .dday.none{color:var(--ink-faint);font-weight:400}
  .dday-badge{margin-left:auto;background:var(--orange);color:#fff;border-radius:9999px;padding:2px 8px;font-size:12px;font-weight:600;white-space:nowrap}
  .card.urgent{border-color:rgba(221,91,0,.5);box-shadow:0 0 0 1px rgba(221,91,0,.22)}
  .card h3{margin:0 0 4px;font-size:16px;font-weight:600;line-height:1.35}
  .card .sum{margin:0 0 8px;font-size:14px;color:var(--ink-muted);
    display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
  .foot{display:flex;flex-wrap:wrap;gap:4px 12px;font-size:12px;color:var(--ink-faint)}

  /* Region groups */
  .grpsec{margin-bottom:32px}
  .grpsec h2{display:flex;align-items:center;gap:8px;margin:0 0 12px;font-size:18px;font-weight:700}
  .grpsec .rtag{border-radius:6px;background:var(--primary);color:#fff;padding:2px 8px;font-size:14px}
  .grpsec .rcnt{font-size:14px;font-weight:400;color:var(--ink-faint)}

  .empty{padding:64px 0;text-align:center;color:var(--ink-faint)}
  footer{border-top:1px solid var(--hairline);background:var(--canvas)}
  footer .in{max-width:768px;margin:0 auto;padding:32px 16px;text-align:center;font-size:12px;color:var(--ink-faint)}
  .note{max-width:768px;margin:12px auto 0;padding:0 16px;font-size:12px;color:var(--ink-faint)}
</style>
</head>
<body>
  <!-- HERO -->
  <section class="hero">
    <div class="dots">
      <span style="top:18%;left:12%;width:8px;height:8px;background:var(--sky)"></span>

    </div>
  </section>

  <div class="wrap">
    <!-- PROFILE -->
    <div class="panel" id="panel">
      <button id="panelToggle">
        <span>내 정보로 맞춤 찾기</span>
        <span class="tagline" id="tagline" style="display:none"></span>
        <span class="caret">▼</span>
      </button>
      <div class="body">
        <div class="grp">
          <p class="lbl">지역</p>
          <select id="region"><option value="">선택 안 함</option></select>
        </div>
        <div class="grp">
          <p class="lbl">대상 (복수 선택)</p>
          <div class="chips" id="targets"></div>
        </div>
        <div class="grp">
          <p class="lbl">관심 분야 (복수 선택)</p>
          <div class="chips" id="interests"></div>
        </div>
      </div>
    </div>

    <!-- FILTER BAR -->
    <div class="bar">
      <input type="text" id="q" placeholder="사업명·키워드 검색 (예: 창업, 자금, 청년)" />
      <div class="row">
        <button class="tgl" id="matchBtn" disabled>내 맞춤만</button>
        <button class="tgl dark" id="regionBtn">지역별 보기</button>
        <label class="check"><input type="checkbox" id="hideExpired" checked /> 마감 제외</label>
        <span class="count"><span id="count">10</span>건</span>
      </div>
    </div>

    <div id="list"></div>
  </div>

  <footer><div class="in">데이터 출처: 기업마당(bizinfo.go.kr) · 1시간마다 갱신 · <b>디자인 미리보기(샘플 데이터)</b></div></footer>

    {t:"[경북] 경산시 2026년 2차 생활소비재 융복합산업 글로벌마케팅 지원사업 수혜기업 모집 공고",cat:"수출",rgn:["경북"],org:"경상북도",target:"중소기업",end:"2026-07-28",sum:"2026년도 경상북도와 경산시에서 지원하는 해외 마케팅 지원사업「2026년 생활소비재 융복합산업 해외 마케팅 지원사업」의 공고를 다음과 같이 진행하오니 참여를 희…",url:"https://www.bizinfo.go.kr/sii/siia/selectSIIA200Detail.do?pblancId=PBLN_000000000124189"},
    {t:"[전남광주] 여수시 2026년 2차 석유화학산업 고용위기 대응 기업지원사업 모집 공고",cat:"인력",rgn:[],org:"전남광주통합특별시",target:"중소기업",end:"2026-07-31",sum:"전남광주통합특별시 지역주도형 일자리사업 「여수 석유화학산업 고용위기 대응 기업지원사업」의 참여기업을 아래와 같이 모집합니다. ☞ 여수시 소재 본사 …",url:"https://www.bizinfo.go.kr/sii/siia/selectSIIA200Detail.do?pblancId=PBLN_000000000124188"}
  ];

  const state={q:"",hideExpired:true,byRegion:false,matchMine:false,region:"",targets:[],interests:[]};
  const KEY="policyhub.preview.profile";
  try{Object.assign(state,JSON.parse(localStorage.getItem(KEY)||"{}"))}catch(e){}

  const $=s=>document.querySelector(s);
  function saveProfile(){localStorage.setItem(KEY,JSON.stringify({region:state.region,targets:state.targets,interests:state.interests}))}
  function profileSet(){return !!state.region||state.targets.length||state.interests.length}

  function daysLeft(end){if(!end)return null;const e=new Date(end+"T23:59:59");return Math.ceil((e-new Date())/864e5)}
  function match(p){
    if(state.region&&p.rgn.length&&!p.rgn.includes(state.region)&&!p.rgn.includes("전국"))return false;
    if(state.targets.length){const hay=p.target+" "+p.t+" "+p.sum;
      if(!state.targets.some(t=>(TARGET_KW[t]||[t]).some(k=>hay.includes(k))))return false;}
    if(state.interests.length&&!state.interests.includes(p.cat))return false;
    return true;
  }

  function render(){
    let list=DATA.filter(p=>{
      if(state.matchMine&&profileSet()&&!match(p))return false;
      if(state.hideExpired){const d=daysLeft(p.end);if(d!==null&&d<0)return false;}
      if(state.q){const hay=(p.t+p.sum).toLowerCase();if(!hay.includes(state.q.toLowerCase()))return false;}
      return true;
    }).sort((a,b)=>{const da=daysLeft(a.end),db=daysLeft(b.end);
      return (da===null||da<0?1e9:da)-(db===null||db<0?1e9:db)});

    $("#count").textContent=list.length;
    const el=$("#list");
    if(!list.length){el.innerHTML='<p class="empty">조건에 맞는 지원사업이 없습니다.'+(state.matchMine?' 내 정보 조건을 넓혀보세요.':'')+'</p>';return;}

    if(state.byRegion){
      const order=[...REGION_OPTIONS,"전국","전국·공통"];const map={};
      list.forEach(p=>{(p.rgn.length?p.rgn:["전국·공통"]).forEach(r=>{(map[r]=map[r]||[]).push(p)})});
      el.innerHTML=Object.keys(map).sort((a,b)=>(order.indexOf(a)<0?99:order.indexOf(a))-(order.indexOf(b)<0?99:order.indexOf(b)))
        .map(r=>`<section class="grpsec"><h2><span class="rtag">${r}</span><span class="rcnt">${map[r].length}건</span></h2><ul>${map[r].map(card).join("")}</ul></section>`).join("");
    }else{
      el.innerHTML=`<ul>${list.map(card).join("")}</ul>`;
    }
  }
  function card(p){
    const d=daysLeft(p.end);
    const urgent=d!==null&&d>=0&&d<=5;
    const dd=d===null?'<span class="dday none">상시·미정</span>':d<0?'<span class="dday none">마감</span>':urgent?`<span class="dday-badge">마감임박 D-${d}</span>`:`<span class="dday normal">D-${d}</span>`;
    const period=p.end?`~ ${p.end}`:`상시`;
    return `<li><a class="card${urgent?' urgent':''}" href="${p.url||'https://www.bizinfo.go.kr/web/index.do'}" target="_blank" rel="noopener noreferrer">
      <div class="meta">
        <span class="cat"><span class="dot" style="background:${CAT_DOT[p.cat]||'var(--ink-faint)'}"></span>${p.cat}</span>
        ${p.rgn.slice(0,2).map(r=>`<span class="rgn">${r}</span>`).join("")}
        ${dd}
      </div>
      <h3>${p.t}</h3>
      <p class="sum">${p.sum}</p>
      <div class="foot"><span>${p.org}</span><span>대상 ${p.target}</span><span>${period}</span></div>
    </a></li>`;
  }

  // 프로필 UI 구성
  const regSel=$("#region");REGION_OPTIONS.forEach(r=>{const o=document.createElement("option");o.textContent=r;regSel.appendChild(o)});
  regSel.value=state.region;
  regSel.onchange=e=>{state.region=e.target.value;afterProfile()};
  function buildChips(id,opts,key){const box=$(id);box.innerHTML="";opts.forEach(v=>{
    const b=document.createElement("button");b.className="chip"+(state[key].includes(v)?" on":"");b.textContent=v;
    b.onclick=()=>{state[key]=state[key].includes(v)?state[key].filter(x=>x!==v):[...state[key],v];buildChips(id,opts,key);afterProfile()};
    box.appendChild(b)})}
  buildChips("#targets",TARGET_OPTIONS,"targets");
  buildChips("#interests",INTEREST_OPTIONS,"interests");

  function afterProfile(){saveProfile();updateTagline();updateMatchBtn();render()}
  function updateTagline(){const t=$("#tagline");const parts=[state.region,...state.interests].filter(Boolean).slice(0,3);
    if(profileSet()){t.style.display="";t.textContent=parts.join(" · ")+(state.interests.length>2?" …":"")}else t.style.display="none"}
  function updateMatchBtn(){const b=$("#matchBtn");b.disabled=!profileSet();
    if(!profileSet())state.matchMine=false;b.classList.toggle("on",state.matchMine&&profileSet())}

  $("#panelToggle").onclick=()=>{const p=$("#panel");p.classList.toggle("open");
    $("#panelToggle .caret").textContent=p.classList.contains("open")?"▲":"▼"};
  $("#q").oninput=e=>{state.q=e.target.value;render()};
  $("#hideExpired").onchange=e=>{state.hideExpired=e.target.checked;render()};
  $("#matchBtn").onclick=()=>{if(!profileSet())return;state.matchMine=!state.matchMine;updateMatchBtn();render()};
  $("#regionBtn").onclick=()=>{state.byRegion=!state.byRegion;$("#regionBtn").classList.toggle("on",state.byRegion);render()};

  // 초기화
  if(profileSet())state.matchMine=true;
  updateTagline();updateMatchBtn();render();
</script>
</body>
</html>
