name: 청년정책 자동 갱신

on:
  schedule:
    - cron: '5 21 * * *'  # 매일 UTC 21:05 = 한국시간(KST) 06:05
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-youthpolicy:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 온통청년 API에서 청년정책 정보 수집
        env:
          YOUTH_POLICY_API_KEY: ${{ secrets.YOUTH_POLICY_API_KEY }}
        run: node scripts/fetch-youthpolicy.js

      - name: 변경사항 커밋 및 푸시
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/youthpolicy.json
          git diff --staged --quiet || git commit -m "chore: 청년정책 자동 갱신"
          git push
